name: portfolio_site
description: A new Flutter project.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=2.19.2 <3.0.0'

dependencies:
  animated_text_kit: ^4.2.1
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  flutter_staggered_grid_view: ^0.4.1
  flutter_svg: ^0.23.0+1
  get: ^4.6.1
  google_fonts: ^2.1.0
  responsive_framework: ^0.2.0
  universal_html: ^2.0.8
  url_launcher: ^6.0.15

dev_dependencies:
  flutter_lints: ^1.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/github.png
    - assets/facebook.png
    - assets/linkedIn.png
    - assets/flutter.png
    - assets/java.png
    - assets/python.png
    - assets/khalid.png
    - assets/profile1.png
    - assets/flutter_circle.png
    - assets/java_circle.png
    - assets/python_circle.png
    - assets/backend_icon.png
